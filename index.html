<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beast Util Pro</title>
    <style>
        /* Design bleibt exakt wie von dir gewünscht */
        :root { --bg-color: #0b0f19; --card-bg: #151d30; --accent-blue: #3b82f6; --accent-red: #ff3b30; --accent-green: #10b981; --text-color: #ffffff; --text-muted: #94a3b8; }
        body { font-family: sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        .tab-bar { display: flex; gap: 10px; margin-bottom: 20px; background: #151d30; padding: 5px; border-radius: 12px; }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 8px; background: transparent; color: var(--text-muted); font-weight: bold; cursor: pointer; }
        .tab-btn.active { background: var(--accent-blue); color: white; }
        .card { background-color: var(--card-bg); border-radius: 16px; padding: 20px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .btn { background: var(--accent-blue); color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .btn-red { background: var(--accent-red); }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; text-align: center; margin-top: 15px; }
        .speed-main { font-size: 3rem; font-weight: 900; text-align: center; margin: 20px 0; }
        .row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; }
    </style>
</head>
<body>

<div class="container">
    <h1>Beast Util Pro</h1>
    <div id="status" style="margin-bottom: 20px; color: var(--accent-red);">● Getrennt</div>

    <div class="tab-bar">
        <button class="tab-btn active" id="tabDash">📊 Nur Tacho</button>
        <button class="tab-btn" id="tabConfig">⚙️ Setup</button>
    </div>

    <!-- Tacho Sektion -->
    <div id="dashSection">
        <div class="card">
            <div class="speed-main" id="liveSpeed">0</div>
            <div style="text-align: center; color: var(--text-muted);">KM/H</div>
            <div class="grid-3">
                <div><div id="livePower" style="font-weight:bold">0 W</div><small>Leistung</small></div>
                <div><div id="liveCurrent" style="font-weight:bold">0.0 A</div><small>Strom</small></div>
                <div><div id="liveBattery" style="font-weight:bold">0%</div><small>Akku</small></div>
            </div>
        </div>
        <button class="btn" id="connectBtn">Mit Scooter verbinden</button>
    </div>

    <!-- Config Sektion -->
    <div id="configSection" style="display: none;">
        <div class="card">
            <div class="row"><span>Zero-Start</span><input type="checkbox" id="zeroCheck"></div>
            <div class="row"><span>Auto-Park</span><input type="checkbox" id="parkCheck"></div>
            <div class="row"><span>Speed Limit</span><span id="limitVal">30</span> km/h</div>
            <input type="range" id="speedSlider" min="1" max="60" value="30" style="width:100%">
        </div>
        <button class="btn btn-red" id="saveBtn">⚡ Änderungen auf ESP32 schreiben</button>
    </div>
</div>

<script>
    const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
    const CHAR_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";
    let configChar = null;

    // Tabs
    document.getElementById('tabDash').onclick = () => { document.getElementById('dashSection').style.display='block'; document.getElementById('configSection').style.display='none'; };
    document.getElementById('tabConfig').onclick = () => { document.getElementById('dashSection').style.display='none'; document.getElementById('configSection').style.display='block'; };

    // Verbindung
    document.getElementById('connectBtn').onclick = async () => {
        try {
            const device = await navigator.bluetooth.requestDevice({ filters: [{ name: 'ZT3_Pro_Mod' }], optionalServices: [SERVICE_UUID] });
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService(SERVICE_UUID);
            configChar = await service.getCharacteristic(CHAR_UUID);
            await configChar.startNotifications();
            configChar.addEventListener('characteristicvaluechanged', (e) => {
                const v = e.target.value;
                document.getElementById('liveSpeed').textContent = v.getUint8(3);
                document.getElementById('livePower').textContent = v.getUint16(4, true) + " W";
                document.getElementById('liveCurrent').textContent = v.getUint8(6) + " A";
                document.getElementById('liveBattery').textContent = v.getUint8(7) + "%";
            });
            document.getElementById('status').style.color = 'var(--accent-green)';
            document.getElementById('status').textContent = '● Verbunden';
        } catch(e) { alert("Verbindung fehlgeschlagen"); }
    };

    // Schreiben (Hier liegt die Logik für den ESP32)
    document.getElementById('saveBtn').onclick = async () => {
        if (!configChar) return alert("Erst verbinden!");
        
        // Byte 0: Zero, Byte 1: Park, Byte 2: Speed, Byte 3: PwdLen (hier 0)
        const data = new Uint8Array([
            document.getElementById('zeroCheck').checked ? 1 : 0,
            document.getElementById('parkCheck').checked ? 1 : 0,
            parseInt(document.getElementById('speedSlider').value),
            0 
        ]);
        
        try {
            await configChar.writeValue(data);
            alert("Erfolgreich übertragen!");
        } catch(e) { alert("Fehler beim Schreiben"); }
    };

    document.getElementById('speedSlider').oninput = (e) => document.getElementById('limitVal').textContent = e.target.value;
</script>
</body>
</html>
