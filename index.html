<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beast Util Pro - Full Dash</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #151d30;
            --accent-blue: #3b82f6;
            --accent-red: #ff3b30;
            --accent-green: #10b981;
            --text-color: #ffffff;
            --text-muted: #94a3b8;
        }
        body { font-family: -apple-system, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        
        /* Dashboard Gauge */
        .gauge-container { position: relative; width: 280px; height: 280px; margin: 20px auto; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .gauge-ring { width: 100%; height: 100%; border-radius: 50%; border: 12px solid #1e293b; position: relative; display: flex; align-items: center; justify-content: center; }
        .speed-val { font-size: 4rem; font-weight: 800; }
        .speed-unit { color: var(--text-muted); font-size: 0.9rem; margin-top: -5px; }
        .gauge-accent { position: absolute; top: -12px; left: -12px; width: 100%; height: 100%; border-radius: 50%; border: 12px solid transparent; border-top-color: var(--accent-blue); border-right-color: var(--accent-blue); transform: rotate(45deg); box-shadow: 0 0 20px rgba(59,130,246,0.3); }

        /* Telemetry Grid */
        .telemetry-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .card { background-color: var(--card-bg); border-radius: 16px; padding: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .label { color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase; margin-bottom: 4px; }
        .value { font-size: 1.2rem; font-weight: bold; }

        /* Config Styling */
        .config-section { margin-top: 30px; border-top: 1px solid #1e293b; padding-top: 20px; }
        .btn { background: var(--accent-blue); color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .btn-red { background: var(--accent-red); }
        
        /* Modal */
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); align-items:center; justify-content:center; }
        .modal-card { background: var(--card-bg); padding: 20px; border-radius: 20px; width: 80%; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align: center;">Dashboard</h2>
    
    <div class="gauge-container">
        <div class="gauge-ring">
            <div class="gauge-accent"></div>
            <div style="text-align: center;">
                <div class="speed-val" id="liveSpeed">0</div>
                <div class="speed-unit">km/h</div>
            </div>
        </div>
    </div>

    <div class="telemetry-grid">
        <div class="card"><div class="label">Current</div><div class="value" id="liveCurrent">0 A</div></div>
        <div class="card"><div class="label">Voltage</div><div class="value" id="liveVoltage">0 V</div></div>
        <div class="card"><div class="label">Power</div><div class="value" id="livePower">0 W</div></div>
        <div class="card"><div class="label">Battery</div><div class="value" id="liveBattery">0 %</div></div>
    </div>

    <button class="btn" id="connectBtn">Verbinden</button>
    <button class="btn" style="background:#475569" id="demoBtn">Simulation</button>

    <div class="config-section">
        <h3>Einstellungen</h3>
        <label><input type="checkbox" id="zeroStart"> Zero-Start</label><br><br>
        <label>Limit: <input type="range" id="speedSlider" min="1" max="60" value="30"></label>
        <button class="btn btn-red" id="saveBtn" style="margin-top:20px;">Änderungen Schreiben</button>
    </div>
</div>

<div class="modal" id="modal">
    <div class="modal-card">
        <h3>Konfiguration Senden</h3>
        <p>Sicher, dass du schreiben willst?</p>
        <button class="btn" id="confirmBtn">Ja, Schreiben</button>
        <button class="btn btn-red" id="cancelBtn">Abbrechen</button>
    </div>
</div>

<script>
    const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
    const CHAR_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";
    let configChar = null;

    // Connect Logik
    document.getElementById('connectBtn').onclick = async () => {
        try {
            const device = await navigator.bluetooth.requestDevice({ filters: [{ name: 'ZT3_Pro_Mod' }], optionalServices: [SERVICE_UUID] });
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService(SERVICE_UUID);
            configChar = await service.getCharacteristic(CHAR_UUID);
            await configChar.startNotifications();
            configChar.addEventListener('characteristicvaluechanged', (e) => {
                const v = e.target.value;
                document.getElementById('liveSpeed').textContent = v.getUint8(3);
                document.getElementById('livePower').textContent = v.getUint16(4, true) + " W";
                document.getElementById('liveCurrent').textContent = v.getUint8(6) + " A";
                document.getElementById('liveBattery').textContent = v.getUint8(7) + "%";
            });
            alert("Verbunden!");
        } catch(e) { alert("Fehler: " + e); }
    };

    // Schreib Logik (Senden an ESP32)
    document.getElementById('saveBtn').onclick = () => document.getElementById('modal').style.display = 'flex';
    document.getElementById('cancelBtn').onclick = () => document.getElementById('modal').style.display = 'none';
    
    document.getElementById('confirmBtn').onclick = async () => {
        if (!configChar) return;
        const data = new Uint8Array([
            document.getElementById('zeroStart').checked ? 1 : 0,
            0, // AutoPark placeholder
            parseInt(document.getElementById('speedSlider').value),
            0 // PwdLen placeholder
        ]);
        await configChar.writeValue(data);
        document.getElementById('modal').style.display = 'none';
        alert("Daten gesendet!");
    };

    // Simulation
    document.getElementById('demoBtn').onclick = () => {
        setInterval(() => {
            document.getElementById('liveSpeed').textContent = Math.floor(Math.random() * 50);
            document.getElementById('livePower').textContent = Math.floor(Math.random() * 1000) + " W";
        }, 1000);
    };
</script>
</body>
</html>
