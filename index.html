<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ausom L1 Control</title>
  <style>
    body { font-family: sans-serif; background: #121212; color: white; text-align: center; padding: 20px; }
    .card { background: #1e1e1e; border-radius: 12px; padding: 20px; margin: 15px auto; max-width: 400px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
    button { background: #ff4757; color: white; border: none; padding: 12px 24px; font-size: 16px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
    button.on { background: #2ed573; }
    input[type=range] { width: 100%; margin: 15px 0; }
  </style>
</head>
<body>

  <h1>Ausom L1 Dashboard</h1>
  
  <div class="card">
    <button id="connectBtn" onclick="connectBLE()">Bluetooth Verbinden</button>
  </div>

  <div class="card">
    <h3>Modus Steuerung</h3>
    <button id="beastBtn" onclick="toggleBeast()">Beast Mode: AUS</button>
    <button id="zeroBtn" onclick="toggleZero()">Zero-Start: AUS</button>
  </div>

  <div class="card">
    <h3>Beast-Mode Limit (<span id="speedVal">100</span>%)</h3>
    <input type="range" id="speedSlider" min="30" max="100" value="100" onchange="setSpeed(this.value)" oninput="document.getElementById('speedVal').innerText=this.value">
  </div>

  <script>
    const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
    const CHAR_UUID    = "beb5483e-36e1-4688-b7f5-ea07361b26a8";
    
    let bleChar;
    let isBeast = false;
    let isZero = false;

    async function connectBLE() {
      try {
        const device = await navigator.bluetooth.requestDevice({
          filters: [{ name: 'Ausom-L1-Controller' }],
          optionalServices: [SERVICE_UUID]
        });
        const server = await device.gatt.connect();
        const service = await server.getPrimaryService(SERVICE_UUID);
        bleChar = await service.getCharacteristic(CHAR_UUID);
        
        document.getElementById('connectBtn').innerText = "Verbunden!";
        document.getElementById('connectBtn').style.background = "#2ed573";
      } catch (error) {
        alert("Fehler bei Verbindung: " + error);
      }
    }

    function sendCommand(cmd) {
      if (bleChar) {
        let encoder = new TextEncoder();
        bleChar.writeValue(encoder.encode(cmd));
      } else {
        alert("Bitte zuerst per Bluetooth verbinden!");
      }
    }

    function toggleBeast() {
      isBeast = !isBeast;
      document.getElementById('beastBtn').innerText = "Beast Mode: " + (isBeast ? "AN" : "AUS");
      document.getElementById('beastBtn').className = isBeast ? "on" : "";
      sendCommand("BEAST:" + (isBeast ? "1" : "0"));
    }

    function toggleZero() {
      isZero = !isZero;
      document.getElementById('zeroBtn').innerText = "Zero-Start: " + (isZero ? "AN" : "AUS");
      document.getElementById('zeroBtn').className = isZero ? "on" : "";
      sendCommand("ZERO:" + (isZero ? "1" : "0"));
    }

    function setSpeed(val) {
      sendCommand("LIMIT:" + val);
    }
  </script>
</body>
</html>
