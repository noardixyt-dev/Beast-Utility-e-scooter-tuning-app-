<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Tuning Control</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --accent-blue: #3b82f6;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        h1 { font-size: 1.4rem; margin: 0 0 10px 0; text-align: center; }
        h2 { font-size: 1.1rem; margin: 0 0 15px 0; color: var(--text-muted); }

        .status-badge {
            padding: 12px;
            border-radius: 12px;
            font-weight: bold;
            text-align: center;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }
        .status-legal { background-color: rgba(16, 185, 129, 0.2); color: var(--accent-green); border: 1px solid var(--accent-green); }
        .status-open { background-color: rgba(239, 68, 68, 0.2); color: var(--accent-red); border: 1px solid var(--accent-red); }

        button {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
            margin-top: 10px;
        }
        button:active { transform: scale(0.98); }

        .btn-connect { background-color: var(--accent-blue); color: white; }
        .btn-toggle { background-color: #334155; color: white; }
        .btn-panic { background-color: var(--accent-red); color: white; font-size: 1.1rem; margin-top: 15px; }

        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .setting-row:last-child { border-bottom: none; }

        /* Custom Switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #475569; transition: .3s; border-radius: 34px;
        }
        .slider:before {
            position: absolute; content: ""; height: 20px; width: 20px; left: 3px; bottom: 3px;
            background-color: white; transition: .3s; border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--accent-green); }
        input:checked + .slider:before { transform: translateX(24px); }

        input[type=range] { width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>⚡ Smart Tuning Center</h1>

    <div class="card">
        <button id="connectBtn" class="btn-connect" onclick="connectBLE()">🔗 Mit Scooter Verbinden</button>
        <div id="statusBadge" class="status-badge status-legal" style="margin-top: 15px;">
            Status: Nicht Verbunden
        </div>
    </div>

    <div class="card">
        <h2>Fahrmodi & Quick-Actions</h2>
        <button class="btn-toggle" onclick="sendCmd('TOGGLE_MODE')">🔓 Wismodus Umschalten</button>
        <button class="btn-panic" onclick="sendCmd('PANIC')">🚨 PANIC BUTTON (20 km/h)</button>
    </div>

    <div class="card">
        <h2>Konfiguration</h2>
        
        <div class="setting-row">
            <span>Zero-Start (Direktanfahrt)</span>
            <label class="switch">
                <input type="checkbox" id="zeroStartToggle" onchange="sendCmd(this.checked ? 'ZERO_ON' : 'ZERO_OFF')">
                <span class="slider"></span>
            </label>
        </div>

        <div class="setting-row" style="flex-direction: column; align-items: flex-start;">
            <span>Drossel-Limit (Legal Mode): <b id="limitVal">2000</b></span>
            <input type="range" id="limitSlider" min="1000" max="3000" value="2000" onchange="sendCmd('LIMIT:' + this.value)" oninput="document.getElementById('limitVal').innerText = this.value">
        </div>

        <div class="setting-row" style="flex-direction: column; align-items: flex-start;">
            <span>Bremshebel-Haltezeit (Boot): <b id="brakeVal">3</b> Sek.</span>
            <input type="range" id="brakeSlider" min="1" max="6" value="3" onchange="sendCmd('BRAKE_TIME:' + this.value)" oninput="document.getElementById('brakeVal').innerText = this.value">
        </div>
    </div>
</div>

<script>
    const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
    const CHAR_UUID    = "beb5483e-36e1-4688-b7f5-ea07361b26a8";

    let bleDevice, bleCharacteristic;

    async function connectBLE() {
        try {
            bleDevice = await navigator.bluetooth.requestDevice({
                filters: [{ name: 'Scooter-Tuning-BLE' }],
                optionalServices: [SERVICE_UUID]
            });

            const server = await bleDevice.gatt.connect();
            const service = await server.getPrimaryService(SERVICE_UUID);
            bleCharacteristic = await service.getCharacteristic(CHAR_UUID);

            document.getElementById('connectBtn').innerText = "✅ Verbunden";
            document.getElementById('connectBtn').style.backgroundColor = "#10b981";

            // Status abfragen
            sendCmd('GET_STATUS');
        } catch (error) {
            alert("Verbindungsfehler: " + error);
        }
    }

    async function sendCmd(cmd) {
        if (!bleCharacteristic) {
            alert("Bitte zuerst per Bluetooth verbinden!");
            return;
        }
        let encoder = new TextEncoder();
        await bleCharacteristic.writeValue(encoder.encode(cmd));
        
        // Nach Befehl kurz warten und UI updaten
        if(cmd === 'TOGGLE_MODE' || cmd === 'PANIC') {
            setTimeout(() => sendCmd('GET_STATUS'), 200);
        }
    }
</script>

</body>
</html>
