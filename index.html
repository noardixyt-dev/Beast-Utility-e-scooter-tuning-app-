<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beast Util Pro</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #151d30;
            --accent-color: #ff3b30;
            --accent-blue: #3b82f6;
            --accent-green: #34c759;
            --text-color: #e2e8f0;
            --text-muted: #64748b;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 900px; /* Mehr Platz für Desktop */
            margin: 0 auto;
        }
        h1 { text-align: center; margin-bottom: 5px; }
        .subtitle { text-align: center; color: var(--text-muted); margin-bottom: 20px; }
        
        /* RESPONSIVE GRID */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }
        @media (min-width: 768px) {
            .dashboard-grid { grid-template-columns: 1fr 1fr; }
            .full-width { grid-column: span 2; }
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }
        .btn {
            background-color: var(--accent-color);
            color: white; border: none; padding: 12px; border-radius: 10px;
            font-weight: bold; cursor: pointer; width: 100%;
        }
        .btn-connect { background-color: var(--accent-green); margin-bottom: 20px; }

        /* TELEMETRIE */
        .speed-main { font-size: 3rem; font-weight: 900; color: #ffffff; }
        .telemetry-grid { display: flex; justify-content: space-between; margin-top: 20px; }
        .tele-item { text-align: center; }
        .tele-value { font-size: 1.2rem; font-weight: bold; }
        .tele-label { font-size: 0.75rem; color: var(--text-muted); }

        /* UI ELEMENTS */
        .row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .switch { position: relative; display: inline-block; width: 50px; height: 28px; }
        .switch input { display: none; }
        .slider-toggle { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #334155; transition: .3s; border-radius: 34px; }
        .slider-toggle:before { position: absolute; content: ""; height: 20px; width: 20px; left: 4px; bottom: 4px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider-toggle { background-color: var(--accent-color); }
        input:checked + .slider-toggle:before { transform: translateX(22px); }
        
        .badge { padding: 5px 10px; border-radius: 6px; margin: 2px; display: inline-block; font-weight: bold; }
        .badge-l { background-color: var(--accent-blue); }
        .badge-r { background-color: var(--accent-color); }
    </style>
</head>
<body>

<div class="container">
    <h1>Beast Util Pro</h1>
    <div class="subtitle" id="connection-status"><span class="status-dot"></span> Getrennt</div>
    <button class="btn btn-connect" id="connectBtn">Mit Scooter verbinden</button>

    <div class="dashboard-grid">
        <!-- Live Tacho -->
        <div class="card full-width" style="text-align: center; background: linear-gradient(145deg, #18233c, #111827);">
            <div class="speed-main" id="liveSpeed">0</div>
            <div>KM/H</div>
            <div class="telemetry-grid">
                <div class="tele-item"><div class="tele-value" id="livePower">0 W</div><div class="tele-label">Leistung</div></div>
                <div class="tele-item"><div class="tele-value" id="liveCurrent">0.0 A</div><div class="tele-label">Strom</div></div>
                <div class="tele-item"><div class="tele-value" id="liveBattery">0%</div><div class="tele-label">Akku</div></div>
            </div>
        </div>

        <!-- Konfig -->
        <div class="card">
            <h3>Einstellungen</h3>
            <div class="row"><span>Zero-Start</span><label class="switch"><input type="checkbox" id="zeroStartToggle" disabled><span class="slider-toggle"></span></label></div>
            <div class="row"><span>Auto-Parken</span><label class="switch"><input type="checkbox" id="autoParkToggle" disabled><span class="slider-toggle"></span></label></div>
            <div style="margin-top:20px">
                <label>Max. Speed: <span id="speedDisplay">30</span> km/h</label>
                <input type="range" id="speedSlider" min="20" max="60" value="30" style="width:100%" disabled>
            </div>
        </div>

        <!-- Code Editor -->
        <div class="card">
            <h3>Beast Code</h3>
            <div id="pwdDisplay" style="margin-bottom:10px; min-height:40px; border:1px solid #333; padding:5px; border-radius:8px;"></div>
            <div style="display:flex; gap:5px;">
                <button class="btn" style="background:var(--accent-blue)" id="addLBtn" disabled>+ L</button>
                <button class="btn" id="addRBtn" disabled>+ R</button>
            </div>
            <button class="btn" style="background:#444; margin-top:10px;" id="clearPwdBtn" disabled>Reset</button>
        </div>
    </div>
</div>

<script>
    // UUIDs wie gehabt
    const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
    const CHARACTERISTIC_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";

    let configCharacteristic = null;
    let passwordSequence = [0, 0, 0, 1, 1, 1];

    // DOM-Elemente
    const connectBtn = document.getElementById('connectBtn');
    const statusText = document.getElementById('connection-status');
    const zeroStartToggle = document.getElementById('zeroStartToggle');
    const autoParkToggle = document.getElementById('autoParkToggle');
    const speedSlider = document.getElementById('speedSlider');
    const speedDisplay = document.getElementById('speedDisplay');
    const pwdDisplay = document.getElementById('pwdDisplay');

    // Verbindung
    connectBtn.addEventListener('click', async () => {
        try {
            const device = await navigator.bluetooth.requestDevice({ filters: [{ name: 'ZT3_Pro_Mod' }], optionalServices: [SERVICE_UUID] });
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService(SERVICE_UUID);
            configCharacteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);
            
            await configCharacteristic.startNotifications();
            configCharacteristic.addEventListener('characteristicvaluechanged', (e) => {
                const v = e.target.value;
                document.getElementById('liveSpeed').textContent = v.getUint8(3);
                document.getElementById('livePower').textContent = v.getUint16(4, true) + " W";
                document.getElementById('liveCurrent').textContent = v.getUint8(6) + " A";
                document.getElementById('liveBattery').textContent = v.getUint8(7) + "%";
            });

            statusText.textContent = "Verbunden";
            connectBtn.style.display = 'none';
            [zeroStartToggle, autoParkToggle, speedSlider, document.getElementById('addLBtn'), document.getElementById('addRBtn'), document.getElementById('clearPwdBtn')].forEach(el => el.disabled = false);
        } catch (e) { console.error(e); }
    });

    // Code & Events wie bisher...
    // (Der restliche Logik-Teil bleibt exakt gleich wie im vorherigen Code)
    // Einfach die Funktionen sendData, renderPasswordUI etc. hier unten einfügen.
    // ...
</script>
</body>
</html>
